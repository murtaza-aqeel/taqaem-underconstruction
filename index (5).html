<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taqaem — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --dark: #0d0d0d;
      --surface: #111111;
      --muted: #555;
      --text: #e8e0d0;
    }

    html, body {
      height: 100%;
      background: var(--light);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Thin horizontal lines decoration */
    .lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .lines span {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    }
    .lines span:nth-child(1) { top: 20%; }
    .lines span:nth-child(2) { top: 80%; }

    /* Main layout */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    /* Logo / Brand */
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    /* Ornament line */
    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }
    .ornament::before,
    .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament::after {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .ornament-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* Headline */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.6s;
    }
    .headline em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* Sub-headline */
    .sub {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 300;
      color: #a09880;
      letter-spacing: 0.02em;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.8s;
    }

    /* Progress bar */
    .progress-wrap {
      width: min(360px, 90vw);
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1s;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .progress-track {
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      animation: fillBar 2.5s cubic-bezier(0.22,1,0.36,1) forwards 1.4s;
    }
    @keyframes fillBar {
      to { width: 15%; }
    }

    /* Bottom ornament + footer */
    .bottom-ornament {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }
    .bottom-ornament .ornament { margin-bottom: 1.2rem; }

    .footer-note {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-note a {
      color: var(--gold);
      text-decoration: none;
      transition: color 0.3s;
    }
    .footer-note a:hover { color: var(--gold-light); }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 28px; height: 28px;
      opacity: 0.35;
    }
    .corner--tl { top: 1.8rem; left: 1.8rem; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 1.8rem; right: 1.8rem; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 1.8rem; left: 1.8rem; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 1.8rem; right: 1.8rem; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      pointer-events: none;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
    }
  </style>
</head>
<body>
<div class="lines"><span></span> <span></span></div>
<!-- Corner decorations -->
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>
<main class="stage">
<p class="brand">Taqaem  ·  Est. 2026</p>
<div class="ornament">
<div class="ornament-diamond"></div>
</div>
<h1 class="headline">Under<br /><em>Construction</em></h1>
<p class="sub">Something <strong style="color: var(--text); font-weight: 500;">remarkable</strong> is on its way. We're crafting every detail with care — stay tuned for a truly special experience.</p>
<div class="progress-wrap">
<div class="progress-label"><span>Progress</span> <span id="pct">0%</span></div>
<div class="progress-track">
<div class="progress-fill" id="bar"></div>
</div>
</div>
<div class="bottom-ornament">
<div class="ornament">
<div class="ornament-diamond"></div>
</div>
<p class="footer-note">Enquiries  ·  <a href="mailto:hello@taqaem.com">khidma@taqaem.com</a></p>
</div>
</main>
<p>
<script>
    // Animate percentage counter
    const pctEl = document.getElementById('pct');
    let start = null;
    const target = 15, duration = 2500, delay = 1400;
    setTimeout(() => {
      requestAnimationFrame(function step(ts) {
        if (!start) start = ts;
        const p = Math.min((ts - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        pctEl.textContent = Math.round(ease * target) + '%';
        if (p < 1) requestAnimationFrame(step);
      });
    }, delay);

    // Floating particles
    function spawnParticle() {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = Math.random() * 3 + 1;
      el.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        bottom:-10px;
        animation-duration:${8 + Math.random()*10}s;
        animation-delay:${Math.random()*4}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
    for (let i = 0; i < 18; i++) spawnParticle();
    setInterval(spawnParticle, 2200);
  </script>
</p>
</body>
</html>
